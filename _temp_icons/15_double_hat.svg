  <path d="M300 130 L360 320 L240 320 Z" fill="#1E1045" stroke="#6C3FA0" stroke-width="2" opacity="0.5"/>
  <!-- Front hat -->
  <path d="M220 100 L310 330 L130 330 Z" fill="#2D1B4E" stroke="#8B5CF6" stroke-width="3"/>
  <ellipse cx="220" cy="335" rx="110" ry="24" fill="#2D1B4E" stroke="#8B5CF6" stroke-width="3"/>
  <!-- Combined brim -->
  <line x1="330" y1="335" x2="370" y2="328" stroke="#6C3FA0" stroke-width="2" opacity="0.5"/>
  <!-- Stars -->
  <circle cx="250" cy="200" r="5" fill="#FBBF24"/>
  <circle cx="330" cy="180" r="4" fill="#FBBF24" opacity="0.5"/>
</svg>