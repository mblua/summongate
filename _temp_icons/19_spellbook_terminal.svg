<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="100" fill="#0D0D12"/>
  <!-- Book -->
  <rect x="140" y="130" width="232" height="280" rx="8" fill="#2D1B4E" stroke="#6C3FA0" stroke-width="3"/>
  <!-- Spine -->
  <line x1="256" y1="130" x2="256" y2="410" stroke="#4C1D95" stroke-width="4"/>
  <!-- Pages left -->
  <rect x="155" y="145" width="90" height="250" rx="3" fill="#1A1025"/>
  <!-- Pages right -->
  <rect x="267" y="145" width="90" height="250" rx="3" fill="#1A1025"/>
  <!-- Terminal text on pages -->
  <text x="165" y="180" font-family="monospace" font-size="14" fill="#10B981">$ summon</text>
  <text x="165" y="200" font-family="monospace" font-size="14" fill="#6C3FA0">gate --new</text>
  <text x="165" y="220" font-family="monospace" font-size="14" fill="#A78BFA">session_1</text>
  <text x="165" y="240" font-family="monospace" font-size="14" fill="#10B981">$ _</text>
  <!-- Rune on right page -->
  <circle cx="312" cy="220" r="35" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
  <polygon points="312,185 320,210 345,210 325,225 332,250 312,237 292,250 299,225 279,210 304,210"
    fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <!-- Bookmark -->
  <path d="M340 130 L340 100 L355 115 L370 100 L370 130" fill="#DC2626"/>
</svg>